name: Bump openpets cask

# Once a day, check upstream (alvinunreal/openpets) for a newer release. If found, update
# Casks/openpets.rb (version + both arm64/x64 sha256, read from upstream's SHA256SUMS) and
# commit the bump straight to main, so `brew upgrade --cask openpets` picks it up. Self-
# contained: no third-party actions, no large downloads, uses the built-in GITHUB_TOKEN.
# Also runnable on demand from the Actions tab.
#
# (Commits to main directly because the Meade-Group org blocks Actions from opening PRs. To
# switch to a review-gated PR instead, add a PAT secret with pull-requests:write and replace
# the final push/commit with `gh pr create`.)

on:
  schedule:
    - cron: "0 7 * * *" # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM: alvinunreal/openpets
      CASK: Casks/openpets.rb
    steps:
      - uses: actions/checkout@v4

      - name: Bump cask if upstream has a newer release
        run: |
          set -euo pipefail

          current="$(grep -E '^\s*version ' "$CASK" | sed -E 's/.*"([^"]+)".*/\1/')"
          latest="$(gh api "repos/$UPSTREAM/releases/latest" --jq '.tag_name' | sed -E 's/^v//')"
          echo "current=$current  latest=$latest"

          if [ "$current" = "$latest" ]; then
            echo "Cask already at the latest version; nothing to do."
            exit 0
          fi

          sums="$(curl -fsSL "https://github.com/$UPSTREAM/releases/download/v${latest}/SHA256SUMS")"
          arm="$(printf '%s\n'  "$sums" | awk -v f="OpenPets-${latest}-mac-arm64.dmg" '$2==f{print $1}')"
          intel="$(printf '%s\n' "$sums" | awk -v f="OpenPets-${latest}-mac-x64.dmg"   '$2==f{print $1}')"
          if [ -z "$arm" ] || [ -z "$intel" ]; then
            echo "::error::Could not find both macOS .dmg checksums for v${latest} in SHA256SUMS"
            exit 1
          fi

          sed -i -E "s/(^\s*version )\"[^\"]*\"/\1\"${latest}\"/"                 "$CASK"
          sed -i -E "s/(arm:[[:space:]]*)\"[0-9a-fA-F]{64}\"/\1\"${arm}\"/"       "$CASK"
          sed -i -E "s/(intel:[[:space:]]*)\"[0-9a-fA-F]{64}\"/\1\"${intel}\"/"   "$CASK"

          if git diff --quiet -- "$CASK"; then
            echo "::error::Version differs ($current -> $latest) but cask file was not modified (regex mismatch?)"
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "openpets ${latest}"
          git push origin HEAD:main
          echo "Bumped openpets ${current} -> ${latest} on main."
